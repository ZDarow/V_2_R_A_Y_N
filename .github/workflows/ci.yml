name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          gh_version=$(curl -s https://api.github.com/repos/rhysd/actionlint/releases/latest | grep tag_name | cut -d'"' -f4)
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/$gh_version/actionlint_$(echo $gh_version | sed 's/^v//')_linux_amd64.tar.gz" \
            | tar xz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/
      - name: Run actionlint
        run: actionlint -color

  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint 2>/dev/null || sudo apt-get install -y -qq yamllint 2>/dev/null || pip3 install yamllint
      - name: Run yamllint
        run: yamllint -c .yamllint.yml .github/workflows/ 2>/dev/null || yamllint .github/workflows/

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Run ShellCheck
        run: |
          errors=0
          files="
            install.sh uninstall.sh apply-configs.sh lib/common.sh
            scripts/update-rules.sh scripts/proxy-toggle.sh
            scripts/proxy_set_linux_sh.sh scripts/status.sh
            scripts/diagnose.sh scripts/kill-switch.sh
            scripts/migrate-allowinsecure.sh scripts/diagnose-network.sh
            scripts/netcheck.sh scripts/mobile-netcheck.sh
            scripts/proxy-manager-gui.sh scripts/traffic-capture.sh
            scripts/v2ray-manager.sh scripts/v2ray-fix-all.sh
            scripts/restore-all.sh scripts/optimize-mobile.sh
            mobile/scripts/deploy-mobile.sh
            mobile/scripts/generate-mobile-url.sh
            mobile/scripts/mobile-apply-routing.sh
            mobile/scripts/mobile-setup-termux.sh
          "
          for f in $files; do
            if [ -f "$f" ]; then
              echo "Checking $f..."
              shellcheck -S warning -e SC1091 "$f" || { echo "SC ISSUES: $f"; errors=$((errors+1)); }
            fi
          done
          [ "$errors" -eq 0 ] || exit 1

  bash-syntax:
    name: Bash Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bash syntax
        run: |
          errors=0
          for f in \
            install.sh uninstall.sh apply-configs.sh \
            lib/common.sh \
            scripts/update-rules.sh scripts/proxy-toggle.sh \
            scripts/proxy_set_linux_sh.sh \
            scripts/status.sh scripts/diagnose.sh scripts/kill-switch.sh \
            scripts/migrate-allowinsecure.sh scripts/diagnose-network.sh \
            scripts/netcheck.sh scripts/mobile-netcheck.sh \
            scripts/proxy-manager-gui.sh scripts/traffic-capture.sh \
            scripts/v2ray-manager.sh scripts/v2ray-fix-all.sh \
            scripts/restore-all.sh scripts/optimize-mobile.sh \
            mobile/scripts/deploy-mobile.sh \
            mobile/scripts/generate-mobile-url.sh \
            mobile/scripts/mobile-apply-routing.sh \
            mobile/scripts/mobile-setup-termux.sh
          do
            if [ -f "$f" ]; then
              echo "Checking $f..."
              bash -n "$f" || { echo "Syntax error in $f"; errors=$((errors+1)); }
            fi
          done
          [ "$errors" -eq 0 ] || exit 1

  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON syntax
        run: |
          errors=0
          for f in config/*.json; do
            echo "Validating $f..."
            if command -v python3 &>/dev/null; then
              python3 -m json.tool "$f" > /dev/null || { echo "INVALID JSON: $f"; errors=$((errors+1)); }
            else
              echo "python3 not available, skipping json validation"
            fi
            echo "  OK"
          done
          [ "$errors" -eq 0 ] || { echo "JSON validation failed: $errors file(s) with errors"; exit 1; }
      - name: Validate JSON Schema
        run: |
          pip install check-jsonschema 2>/dev/null || pip3 install check-jsonschema
          for schema_file in spec/json-schema/xray-config.json mobile/spec/json-schema/routing-rules.json; do
            schema_name="$(basename "$schema_file" .json)"
            case "$schema_name" in
              xray-config)
                check-jsonschema --schemafile "$schema_file" config/config-template-xray.json || {
                  echo "SCHEMA ERROR: config/config-template-xray.json vs $schema_file"
                  exit 1
                }
                echo "✓ xray-config: schema passed"
                ;;
              routing-rules)
                check-jsonschema --schemafile "$schema_file" config/routing-russia.json || {
                  echo "SCHEMA ERROR: config/routing-russia.json vs $schema_file"
                  exit 1
                }
                check-jsonschema --schemafile "$schema_file" config/only_blocked.json || {
                  echo "SCHEMA ERROR: config/only_blocked.json vs $schema_file"
                  exit 1
                }
                echo "✓ routing-rules: schema passed"
                ;;
            esac
          done

  bats-tests:
    name: BATS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats 2>/dev/null || \
            npm install -g bats 2>/dev/null
      - name: Run BATS tests
        run: |
          bats --print-output-on-failure spec/common_spec.bash spec/status_spec.bash \
            spec/install_spec.bash spec/killswitch_spec.bash

  markdown-check:
    name: Markdown Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint
        run: npm install -g markdownlint-cli2
      - name: Check markdown files
        run: |
          errors=0
          for f in \
            README.md CHANGELOG.md \
            docs/INDEX.md docs/INSTALL.md docs/USAGE.md docs/ARCHITECTURE.md \
            docs/CONFIGURATION.md docs/SCRIPTS.md docs/TROUBLESHOOTING.md \
            docs/ci.md docs/faq.md \
            subscriptions/README.md mobile/docs/mobile.md
          do
            if [ ! -f "$f" ]; then
              echo "  $f: MISSING"
              errors=$((errors+1))
              continue
            fi
            echo "  $f: OK ($(wc -l < "$f") lines)"
            markdownlint-cli2 "$f" 2>&1 || { echo "  $f: lint warnings"; }
          done
          [ "$errors" -eq 0 ] || exit 1
