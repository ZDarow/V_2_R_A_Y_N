name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Run ShellCheck
        run: |
          errors=0
          files="install.sh uninstall.sh lib/common.sh scripts/update-rules.sh \
            scripts/proxy-toggle.sh scripts/proxy_set_linux_sh.sh \
            scripts/deploy-mobile.sh scripts/generate-mobile-url.sh \
            scripts/mobile-setup-termux.sh scripts/mobile-apply-routing.sh \
            scripts/status.sh scripts/diagnose.sh scripts/kill-switch.sh"
          for f in $files; do
            if [ -f "$f" ]; then
              echo "Checking $f..."
              shellcheck -S warning -e SC1091 "$f" || { echo "SC ISSUES: $f"; errors=$((errors+1)); }
            fi
          done
          [ "$errors" -eq 0 ] || exit 1

  bash-syntax:
    name: Bash Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bash syntax
        run: |
          errors=0
          for f in \
            install.sh uninstall.sh \
            lib/common.sh \
            scripts/update-rules.sh scripts/proxy-toggle.sh \
            scripts/proxy_set_linux_sh.sh scripts/deploy-mobile.sh \
            scripts/generate-mobile-url.sh scripts/mobile-setup-termux.sh \
            scripts/mobile-apply-routing.sh \
            scripts/status.sh scripts/diagnose.sh scripts/kill-switch.sh
          do
            if [ -f "$f" ]; then
              echo "Checking $f..."
              bash -n "$f" || { echo "Syntax error in $f"; errors=$((errors+1)); }
            fi
          done
          [ "$errors" -eq 0 ] || exit 1

  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON syntax
        run: |
          errors=0
          for f in config/*.json; do
            echo "Validating $f..."
            if command -v python3 &>/dev/null; then
              python3 -m json.tool "$f" > /dev/null || { echo "INVALID JSON: $f"; errors=$((errors+1)); }
            else
              echo "python3 not available, skipping json validation"
            fi
            echo "  OK"
          done
          [ "$errors" -eq 0 ] || { echo "JSON validation failed: $errors file(s) with errors"; exit 1; }
      - name: Validate JSON Schema (v2rayNG routing)
        run: |
          if command -v ajv &>/dev/null; then
            for f in config/v2rayng-routing-russia.json config/v2rayng-only-blocked.json; do
              echo "Schema check: $f"
              ajv validate -s spec/json-schema/routing-rules.json -d "$f" || {
                echo "SCHEMA ERROR: $f"
                exit 1
              }
            done
            echo "All JSON Schema checks passed"
          else
            echo "ajv not available, skipping schema validation"
          fi

  bats-tests:
    name: BATS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats 2>/dev/null || \
            npm install -g bats 2>/dev/null
      - name: Run BATS tests
        run: |
          bats --print-output-on-failure spec/common_spec.bash spec/status_spec.bash \
            spec/install_spec.bash spec/killswitch_spec.bash

  markdown-check:
    name: Markdown Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint
        run: npm install -g markdownlint-cli2 2>/dev/null || sudo apt-get install -y -qq markdownlint 2>/dev/null || echo "markdownlint not available, falling back to basic check"
      - name: Check markdown files
        run: |
          errors=0
          for f in \
            README.md CHANGELOG.md \
            docs/README.md docs/install.md docs/mobile.md \
            docs/routing.md docs/scripts.md docs/ci.md docs/faq.md \
            subscriptions/README.md
          do
            if [ ! -f "$f" ]; then
              echo "  $f: MISSING"
              errors=$((errors+1))
              continue
            fi
            echo "  $f: OK ($(wc -l < "$f") lines)"
            if command -v markdownlint &>/dev/null; then
              markdownlint "$f" 2>/dev/null || { echo "  $f: lint warnings"; }
            elif command -v markdownlint-cli2 &>/dev/null; then
              markdownlint-cli2 "$f" 2>/dev/null || { echo "  $f: lint warnings"; }
            fi
          done
          [ "$errors" -eq 0 ] || exit 1
